name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          # Create dist directory
          mkdir -p dist

          # Build for Linux (amd64)
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-linux-amd64 main.go

          # Build for Linux (arm64)
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-linux-arm64 main.go

          # Build for macOS (amd64)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-darwin-amd64 main.go

          # Build for macOS (arm64/Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-darwin-arm64 main.go

          # Build for Windows (amd64)
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-windows-amd64.exe main.go

          # Build for Windows (arm64)
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" -o dist/tuido-windows-arm64.exe main.go

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## Tuido ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Download the appropriate binary for your platform:" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "- **Linux (x64)**: \`tuido-linux-amd64\`" >> $GITHUB_OUTPUT
          echo "- **Linux (ARM64)**: \`tuido-linux-arm64\`" >> $GITHUB_OUTPUT
          echo "- **macOS (Intel)**: \`tuido-darwin-amd64\`" >> $GITHUB_OUTPUT
          echo "- **macOS (Apple Silicon)**: \`tuido-darwin-arm64\`" >> $GITHUB_OUTPUT
          echo "- **Windows (x64)**: \`tuido-windows-amd64.exe\`" >> $GITHUB_OUTPUT
          echo "- **Windows (ARM64)**: \`tuido-windows-arm64.exe\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "Make the binary executable (Linux/macOS):" >> $GITHUB_OUTPUT
          echo "\`\`\`bash" >> $GITHUB_OUTPUT
          echo "chmod +x tuido-*" >> $GITHUB_OUTPUT
          echo "sudo mv tuido-* /usr/local/bin/tuido" >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Checksums" >> $GITHUB_OUTPUT
          echo "See \`checksums.txt\` for SHA256 verification." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.version.outputs.VERSION }} \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --notes "${{ steps.release_notes.outputs.RELEASE_NOTES }}" \
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
